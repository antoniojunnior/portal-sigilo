// ─── Mini Sparkline SVG ───
function Sparkline({ data, color, width: w = 56, height: h = 28 }) {
  if (!data || data.length < 2) return null;
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => `${(i / (data.length - 1)) * w},${h - ((v - min) / range) * (h - 4) - 2}`).join(' ');
  const lastX = w;
  const lastY = h - ((data[data.length - 1] - min) / range) * (h - 4) - 2;
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{ overflow: 'visible' }}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" opacity="0.7" />
      <circle cx={lastX} cy={lastY} r="3" fill={color} />
    </svg>
  );
}

// ─── Urgency Ring (donut) ───
function UrgencyRing({ data, size = 72 }) {
  const total = data.reduce((s, d) => s + d.value, 0);
  let angle = -90;
  const r = (size / 2) - 6;
  const cx = size / 2, cy = size / 2;
  const slices = data.map(d => {
    const sweep = (d.value / total) * 360;
    const a0 = angle;
    angle += sweep;
    const toXY = (deg) => ({
      x: cx + r * Math.cos((deg * Math.PI) / 180),
      y: cy + r * Math.sin((deg * Math.PI) / 180),
    });
    const s = toXY(a0), e = toXY(angle - 0.5);
    const large = sweep > 180 ? 1 : 0;
    return { ...d, path: `M${cx},${cy} L${s.x},${s.y} A${r},${r} 0 ${large} 1 ${e.x},${e.y} Z` };
  });
  return (
    <svg width={size} height={size} style={{ flexShrink: 0 }}>
      {slices.map((s, i) => <path key={i} d={s.path} fill={s.color} opacity="0.88" />)}
      <circle cx={cx} cy={cy} r={r * 0.55} fill={T.card} />
    </svg>
  );
}

  );
}
