nfr_validation:
  security:
    status: PASS
    notes: 'Token validado como PRIMEIRA operação. WH-001 (timing attack) corrigido durante gate — agora usa crypto.timingSafeEqual. ASAAS_WEBHOOK_TOKEN apenas em process.env. Nenhum dado financeiro no Firestore. gerarSenhaTemporaria() usa crypto.randomBytes(16) — seguro.'
  performance:
    status: PASS
    notes: 'Operações assíncronas corretas. idempotência via query em asaas_customer_id. E-mail isolado em try/catch separado.'
  reliability:
    status: CONCERNS
    notes: 'WH-002: onboarding quebrado pois email placeholder não chega ao cliente. Org é criada corretamente mas cliente não consegue acessar o dashboard sem intervenção manual.'
  maintainability:
    status: PASS
    notes: 'Helpers bem separados (provisionOrg, atualizarPlanoOrg, logAuditFunction). Código limpo e bem estruturado.'

recommendations:
  immediate:
    - action: 'WH-002: Chamar GET /v3/customers/{customerId} na Asaas API para obter email real do cliente antes de criar usuário admin. ASAAS_API_KEY deve ser adicionada às Functions env vars (functions/.env).'
      refs: ['functions/src/webhookAsaas.ts']
    - action: 'WH-002: nomeOrg também é placeholder. Buscar nome real da empresa via GET /v3/customers/{customerId} junto com o email.'
      refs: ['functions/src/webhookAsaas.ts']
  future:
    - action: 'WH-003: Adicionar sufixo aleatório ao slug sempre (não apenas em colisão) ou usar Firestore transaction para garantir unicidade sob concorrência.'
      refs: ['functions/src/webhookAsaas.ts']
    - action: 'Executar Tasks 8.2 e 8.3 — testes com Firebase Emulator e curl payload antes de deploy em produção.'
      refs: ['functions/src/webhookAsaas.ts']
    - action: 'Adicionar Firestore index em orgs.asaas_customer_id para query eficiente em produção (scale).'
      refs: ['firestore.indexes.json']
