schema: 1
story: '9.2'
story_title: 'Webhook Asaas — Criação Automática de Org e Onboarding'
gate: CONCERNS
status_reason: 'Lógica de provisionamento correta e idempotente. WH-001 (timing attack) corrigido durante o gate. WH-002 é concern funcional crítico: email admin usa endereço placeholder — cliente real jamais recebe credenciais. Requer fix antes de ir para produção.'
reviewer: 'Quinn (Test Architect)'
updated: '2026-05-30T00:00:00-03:00'

top_issues:
  - id: WH-002
    severity: high
    category: requirements
    description: 'adminEmail é placeholder gerado (admin-{orgId}@portalsigilo-pending.com) pois o webhook Asaas não inclui o email do cliente no payload. O email de boas-vindas com senha temporária nunca chega ao cliente real.'
    recommendation: 'Chamar GET /v3/customers/{customerId} na API Asaas para obter o email real antes de criar o usuário admin. Requer ASAAS_API_KEY nas Functions env vars.'
    suggested_owner: dev
  - id: WH-003
    severity: medium
    category: code
    description: 'TOCTOU race condition na geração de slug: duas orgs criadas simultaneamente podem passar ambas pela verificação de unicidade antes de qualquer uma gravar.'
    recommendation: 'Usar Firestore transaction ou adicionar sufixo aleatório sempre (não apenas em colisão) para maior robustez.'
    suggested_owner: dev

waiver: { active: false }

quality_score: 70
expires: '2026-06-13T00:00:00-03:00'

evidence:
  tests_reviewed: { count: 0 }
