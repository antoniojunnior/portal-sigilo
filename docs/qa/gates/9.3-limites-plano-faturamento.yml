top_issues:
  - severity: high
    category: security
    description: >
      POST /api/dashboard/users criava usuários via Admin SDK (que bypassa Firestore Rules)
      sem verificar limite de plano — AC-1 não era aplicado no fluxo principal do dashboard.
    recommendation: Adicionar verificação PLAN_USER_LIMITS antes de criar usuário no Route Handler.
    status: FIXED
    suggested_owner: dev

  - severity: medium
    category: code
    description: >
      PATCH /api/dashboard/users/[userId] incrementava/decrementava users_count sem verificar
      o estado atual do usuário — chamadas repetidas corrompem o contador.
    recommendation: Só aplicar delta quando body.ativo !== userData.ativo.
    status: FIXED
    suggested_owner: dev

  - severity: medium
    category: code
    description: >
      Botão "Fazer Upgrade" em configuracoes/page.tsx apontava para /app/configuracoes
      em vez de /app/configuracoes/faturamento.
    recommendation: Corrigir href para /app/configuracoes/faturamento.
    status: FIXED
    suggested_owner: dev

  - severity: low
    category: code
    description: Import `MoreHorizontal` em configuracoes/page.tsx sem uso no JSX.
